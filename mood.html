<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moodflix | Choose Your Mood</title>

<style>
/* ===== PALETTE ===== */
:root {
  --tan: #DB8A98;
  --maroon: #7F0303;
  --alabaster: #EFE8DF;
  --lightblue: #86C0CE;
  --midnight: #0F414A;
}

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}


body {
  background: linear-gradient(
    135deg,
    var(--tan),
    var(--alabaster),
    var(--lightblue),
    var(--midnight)
  );
  background-size: 300% 300%;
  animation: gradientFlow 14s ease infinite;
  color: var(--alabaster);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.8s ease;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 25px 60px;
}

.logo {
  font-size: 32px;
  font-weight: bold;
  color: var(--midnight);
  letter-spacing: 2px;
  cursor: pointer;
  transition: 0.3s;
}

.logo:hover {
  color: var(--maroon);
  transform: scale(1.1);
}

nav a {
  text-decoration: none;
  color: var(--midnight);
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  color:#b63c3c;
}

/* ===== HERO SECTION ===== */
.hero {
  text-align: center;
  margin-top: 100px;
  padding: 0 20px;
  animation: fadeIn 1.2s ease;
}

.hero h1 {
  font-size: 52px;
  margin-bottom: 20px;
  background: linear-gradient(to right, var(--maroon), var(--midnight));
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  max-width: 650px;
  margin: 10px auto;
  font-size: 18px;
  color: var(--midnight);
}

/* ===== MOOD BUTTONS ===== */
.mood-container {
  margin-top: 80px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  animation: fadeIn 1.5s ease;
}

.mood-btn {
  padding: 15px 30px;
  border-radius: 40px;
  border: none;
  font-size: 16px;
  cursor: pointer;
  transition: 0.4s ease;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(12px);
  color: var(--midnight);
  font-weight: bold;
}

.mood-btn:hover {
  transform: translateY(-8px) scale(1.08);
  box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

/* ===== MOOD BACKGROUNDS ===== */
.feeling-low {
  background: linear-gradient(135deg, var(--maroon), black);
  background-size: cover;
  animation: none;
}

.feeling-good {
  background: linear-gradient(135deg, var(--lightblue), var(--midnight));
  background-size: cover;
  animation: none;
}

.feeling-fired {
  background: linear-gradient(135deg, var(--tan), var(--maroon));
  background-size: cover;
  animation: none;
}

.feeling-bored {
  background: linear-gradient(135deg, var(--midnight), var(--lightblue));
  background-size: cover;
  animation: none;
}

.feeling-overwhelmed {
  background: linear-gradient(135deg, var(--maroon), var(--tan));
  background-size: cover;
  animation: none;
}

/* ===== HOME BUTTON ===== */
.home-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--midnight);
  color: var(--alabaster);
  padding: 12px 22px;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

.home-btn:hover {
  background: var(--maroon);
  transform: scale(1.1);
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(25px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<header>
  <div class="logo" onclick="goHome()">Moodflix</div>
  <nav>
    <a href="#">Login</a>
  </nav>
</header>

<section class="hero">
  <h1>How are you feeling today?</h1>
  <p>Some days are heavy. Some days are light.</p>
  <p>Wherever you are today, we’re here with movies that understand.</p>
  <p><strong>Choose your mood and start watching.</strong></p>
</section>

<section class="mood-container">
  <button onclick="window.location.href='low.html'" class="mood-btn" onmouseover="changeMood('feeling-low')">Feeling Low</button>
  <button onclick="window.location.href='overwhelmed.html'" class="mood-btn" onmouseover="changeMood('feeling-overwhelmed')">Feeling Overwhelmed</button>
  <button onclick="window.location.href='good.html'" class="mood-btn" onmouseover="changeMood('feeling-good')">Feeling Good</button>
  <button onclick="window.location.href='fire.html'" class="mood-btn" onmouseover="changeMood('feeling-fired')">Feeling Fired Up</button>
  <button onclick="window.location.href='bored.html'" class="mood-btn" onmouseover="changeMood('feeling-bored')">Feeling Bored</button>
</section>

<div class="home-btn" onclick="goHome()">⬅ Home</div>

<script>
function changeMood(moodClass) {
  document.body.className = moodClass;
}

function goHome() {
  document.body.className = "";
}
</script>

</body>
</html>
