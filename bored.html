<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodflix | bored</title>

<style>
:root {
  --tan: #DB8A98;
  --maroon: #7F0303;
  --alabaster: #EFE8DF;
  --lightblue: #86C0CE;
  --midnight: #0F414A;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0F414A, #86C0CE);
color: #EFE8DF;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 25px 60px;
  align-items: center;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 2px;
}

.login {
  font-weight: bold;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 40px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 15px;
}

.hero p {
  font-size: 18px;
  max-width: 600px;
  margin: auto;
}

/* MOVIES SECTION */
.movies {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 30px;
  padding: 40px 80px;
}

.movie-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.4s ease;
}

.movie-card img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  transition: 0.4s ease;
}

.movie-card:hover img {
  transform: scale(1.1);
}

.movie-title {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  color: white;
  text-align: center;
  font-weight: bold;
  backdrop-filter: blur(5px);
}

/* HOME BUTTON */
.home {
  display: block;
  text-align: center;
  margin: 40px;
  font-weight: bold;
  text-decoration: none;
  color: var(--midnight);
  transition: 0.3s;
}

.home:hover {
  color: var(--maroon);
}
</style>
</head>

<body>

<header>
  <div class="logo">Moodflix</div>
  <div class="login">Login</div>
</header>

<section class="hero">
  <h1>“Let’s wake things up.”</h1>
  <p>
    Adventure is one click away.
You won’t feel bored for long.
  </p>
</section>

<section class="movies">

  <div class="movie-card">
    <img src="images/movie1.jpg">
    <div class="movie-title">Movie 1</div>
  </div>

  <div class="movie-card">
    <img src="images/movie2.jpg">
    <div class="movie-title">Movie 2</div>
  </div>

  <div class="movie-card">
    <img src="images/movie3.jpg">
    <div class="movie-title">Movie 3</div>
  </div>

  <div class="movie-card">
    <img src="images/movie4.jpg">
    <div class="movie-title">Movie 4</div>
  </div>

  <div class="movie-card">
    <img src="images/movie5.jpg">
    <div class="movie-title">Movie 5</div>
  </div>

</section>

<a class="home" href="mood.html">⬅ Change your mood</a>

</body>
</html>
