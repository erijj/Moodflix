<body>
    <header>
        <h1>Mood Flix</h1>
    </header>
   <div class="container">
    <h2>Créer un compte</h2>
    <form>
        <label>Nom :</label>
        <input type="text" placeholder="Nom complet" required><br>
        <label>Prénom :</label>
        <input type="text" placeholder="Prénom complet" required><br>
        <label>Email :</label>
        <input type="email" placeholder="Email" required><br>
        <label>Mot De Passe :</label>
        <input type="password" placeholder="Mot de passe" required><br>
        <input type="password" placeholder="Confirmer mot de passe" required><br>
        <button type="submit">Créer un compte</button>
    </form>

    <div class="login-link">
        Déjà un compte ? <a href="authentification.html">Se connecter</a>
    </div>
