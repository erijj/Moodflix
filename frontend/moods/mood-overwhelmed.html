<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodflix — Feeling Overwhelmed</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
  <style>
    :root { --mood-color: var(--eucalyptus); --mood-glow: rgba(142,175,146,0.3); }
    body { background: linear-gradient(135deg, #0a120d 0%, #0d1f12 50%, #102016 100%); }
    .mood-hero { position:relative;z-index:1;padding:9rem 2.5rem 4rem;max-width:1200px;margin:0 auto; }
    .mood-badge { display:inline-flex;align-items:center;gap:.5rem;padding:.4rem 1.1rem;border-radius:50px;background:rgba(142,175,146,.15);border:1px solid rgba(142,175,146,.3);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--eucalyptus);font-weight:600;margin-bottom:1.2rem;opacity:0;animation:fadeUp .6s ease .3s forwards; }
    .mood-title { font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:700;line-height:1.05;opacity:0;animation:fadeUp .6s ease .5s forwards; }
    .mood-title em { font-style:italic;color:var(--eucalyptus); }
    .quote-strip { background:rgba(142,175,146,.08);border-left:3px solid var(--eucalyptus);border-radius:0 16px 16px 0;padding:1.5rem 2rem;margin:2.5rem 0;opacity:0;animation:fadeUp .6s ease .7s forwards; }
    .quote-text { font-family:'Playfair Display',serif;font-size:1.25rem;font-style:italic;color:rgba(255,255,255,.9);line-height:1.6;margin-bottom:.5rem; }
    .quote-author { font-size:.82rem;color:var(--eucalyptus);font-weight:600;letter-spacing:1px; }
    .movies-section { position:relative;z-index:1;padding:0 2.5rem 6rem;max-width:1200px;margin:0 auto; }
    .movies-header { display:flex;align-items:baseline;gap:1rem;margin-bottom:2rem; }
    .movies-header h2 { font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600; }
    .count-badge { padding:.2rem .8rem;background:var(--mood-glow);border-radius:50px;font-size:.8rem;color:var(--eucalyptus);font-weight:500; }
    .movie-card:hover { box-shadow:0 20px 50px var(--mood-glow),0 0 0 1px rgba(142,175,146,.3); }
    .other-moods { padding:2rem 2.5rem 4rem;max-width:1200px;margin:0 auto;position:relative;z-index:1; }
    .other-moods h3 { font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1rem;color:rgba(255,255,255,.7); }
    .mood-nav-row { display:flex;flex-wrap:wrap;gap:.7rem; }
    .mood-nav-chip { padding:.5rem 1.1rem;border-radius:50px;border:1px solid var(--glass-border);background:var(--glass);color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem;transition:var(--transition);backdrop-filter:blur(10px); }
    .mood-nav-chip:hover { border-color:var(--eucalyptus);color:var(--eucalyptus);transform:translateY(-2px); }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas><div class="page-overlay"></div>
  <nav>
    <a href="/frontend/index.html" class="logo" data-transition>Moodflix</a>
    <button class="hamburger"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="/frontend/pages/all-movies.html" data-transition>All Movies</a></li><li><a href="/frontend/pages/moods.html" data-transition>Moods</a></li>
      <li><a href="/frontend/moods/mood-happy.html" data-transition>Browse</a></li>
      <li><a href="/frontend/pages/profile.html" data-transition>Profile</a></li>
    </ul>
  </nav>
  <div class="mood-hero">
    <div class="mood-badge">😮‍💨 Overwhelmed Mood</div>
    <h1 class="mood-title">Feeling <em>Overwhelmed</em><br />Find your calm 🌿</h1>
    <div class="quote-strip">
      <p class="quote-text">"Nature does not hurry, yet everything is accomplished."</p>
      <p class="quote-author">— Lao Tzu</p>
    </div>
  </div>
  <section class="movies-section">
    <div class="movies-header">
      <h2>Calming Picks</h2>
      <span class="count-badge" id="movie-count">6 films</span>
    </div>
    <div class="movies-grid" id="movies-grid"></div>
  </section>
  <div class="other-moods">
    <h3>Explore other moods →</h3>
    <div class="mood-nav-row">
      <a href="/frontend/moods/mood-happy.html" class="mood-nav-chip" data-transition>😊 Happy</a>
      <a href="/frontend/moods/mood-sad.html" class="mood-nav-chip" data-transition>😢 Sad</a>
      <a href="/frontend/moods/mood-romantic.html" class="mood-nav-chip" data-transition>💕 Romantic</a>
      <a href="/frontend/moods/mood-excited.html" class="mood-nav-chip" data-transition>⚡ Excited</a>
      <a href="/frontend/moods/mood-bored.html" class="mood-nav-chip" data-transition>😑 Bored</a>
    </div>
  </div>
  <script src="/frontend/js/main.js"></script>
  <script>
    const mood='overwhelmed',films=MOVIES[mood]||[],grid=document.getElementById('movies-grid');
    document.getElementById('movie-count').textContent=`${films.length} films`;
    films.forEach((film,i)=>{const card=document.createElement('div');card.className='movie-card reveal';card.style.transitionDelay=`${i*.07}s`;card.innerHTML=`<img src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x600/0a120d/ffffff?text=${encodeURIComponent(film.title)}'"/><div class="movie-card-body"><h3 class="movie-card-title">${film.title}</h3><p class="movie-card-year">${film.year}</p><a href="../pages/movie.html?id=${film.id}&mood=${film.mood}" class="btn btn-glass" style="font-size:.78rem;padding:.45rem 1rem;width:100%;justify-content:center" data-transition>View Details</a></div>`;grid.appendChild(card);});
  </script>
</body>
</html>
