<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodflix — Choose Your Mood</title>
  <link rel="stylesheet" href="/frontend/css/style.css" />
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
    .moods-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      z-index: 1;
    }
    .moods-header { text-align: center; margin-bottom: 3.5rem; }
    .moods-header .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--snapdragon);
      font-weight: 600;
      margin-bottom: 1rem;
      display: block;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s forwards;
    }
    .moods-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.4s forwards;
    }
    .moods-header h1 em { font-style: italic; color: var(--pink); }
    .moods-header p {
      margin-top: 1rem;
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      font-weight: 300;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.6s forwards;
    }

    /* Mood Grid */
    .moods-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.2rem;
      max-width: 700px;
      width: 100%;
      margin-bottom: 2rem;
    }
    .mood-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      padding: 2rem 1rem;
      border-radius: 24px;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: none;
      text-decoration: none;
      color: #fff;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }
    .mood-btn:nth-child(1) { animation-delay: 0.7s; }
    .mood-btn:nth-child(2) { animation-delay: 0.8s; }
    .mood-btn:nth-child(3) { animation-delay: 0.9s; }
    .mood-btn:nth-child(4) { animation-delay: 1.0s; }
    .mood-btn:nth-child(5) { animation-delay: 1.1s; }
    .mood-btn:nth-child(6) { animation-delay: 1.2s; }

    .mood-btn .mood-emoji { font-size: 2.4rem; display: block; transition: transform 0.3s; }
    .mood-btn:hover .mood-emoji { transform: scale(1.2) rotate(-5deg); }
    .mood-btn:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    /* Individual color themes */
    .mood-btn.happy { border-color: var(--snapdragon); }
    .mood-btn.happy:hover { background: rgba(244,201,132,0.2); box-shadow: 0 16px 40px rgba(244,201,132,0.3); }
    .mood-btn.sad { border-color: var(--periwinkle); }
    .mood-btn.sad:hover { background: rgba(157,170,209,0.2); box-shadow: 0 16px 40px rgba(157,170,209,0.3); }
    .mood-btn.romantic { border-color: var(--pink); }
    .mood-btn.romantic:hover { background: rgba(245,143,154,0.2); box-shadow: 0 16px 40px rgba(245,143,154,0.4); }
    .mood-btn.excited { border-color: var(--snapdragon); }
    .mood-btn.excited:hover { background: rgba(244,201,132,0.2); box-shadow: 0 16px 40px rgba(244,201,132,0.3); }
    .mood-btn.overwhelmed { border-color: var(--eucalyptus); }
    .mood-btn.overwhelmed:hover { background: rgba(142,175,146,0.2); box-shadow: 0 16px 40px rgba(142,175,146,0.3); }
    .mood-btn.bored { border-color: var(--leaves); }
    .mood-btn.bored:hover { background: rgba(193,187,122,0.2); box-shadow: 0 16px 40px rgba(193,187,122,0.3); }

    /* Guess CTA */
    .guess-cta {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.7s ease 1.4s forwards;
    }
    .guess-cta p {
      color: rgba(255,255,255,0.5);
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }
    .guess-btn {
      animation: glow 3s ease-in-out infinite;
      font-size: 1rem;
      padding: 1rem 2.5rem;
    }

    @media (max-width: 600px) {
      .moods-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .moods-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="page-overlay"></div>

  <nav>
    <a href="/frontend/index.html" class="logo" data-transition>Moodflix</a>
    <button class="hamburger"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="/frontend/pages/all-movies.html" data-transition>All Movies</a></li><li><a href="/frontend/pages/moods.html" data-transition>Moods</a></li>
      <li><a href="/frontend/moods/mood-happy.html" data-transition>Browse</a></li>
      <li><a href="/frontend/pages/profile.html" data-transition>Profile</a></li>
    </ul>
  </nav>

  <main class="moods-page">
    <div class="moods-header">
      <span class="hero-eyebrow">✦ Mood matching</span>
      <h1>How are you<br />feeling <em>today?</em></h1>
      <p>Select your current emotion — we'll find the perfect film</p>
    </div>

    <div class="moods-grid">
      <a href="/frontend/moods/mood-happy.html" class="mood-btn happy" data-transition>
        <span class="mood-emoji">😊</span>
        Happy
      </a>
      <a href="/frontend/moods/mood-sad.html" class="mood-btn sad" data-transition>
        <span class="mood-emoji">😢</span>
        Sad
      </a>
      <a href="/frontend/moods/mood-romantic.html" class="mood-btn romantic" data-transition>
        <span class="mood-emoji">💕</span>
        Romantic
      </a>
      <a href="/frontend/moods/mood-excited.html" class="mood-btn excited" data-transition>
        <span class="mood-emoji">⚡</span>
        Excited
      </a>
      <a href="/frontend/moods/mood-overwhelmed.html" class="mood-btn overwhelmed" data-transition>
        <span class="mood-emoji">😮‍💨</span>
        Overwhelmed
      </a>
      <a href="/frontend/moods/mood-bored.html" class="mood-btn bored" data-transition>
        <span class="mood-emoji">😑</span>
        Bored
      </a>
    </div>

    <div class="guess-cta">
      <p>Not sure how you feel?</p>
      <a href="/frontend/pages/guess-mood.html" class="btn btn-primary guess-btn" data-transition>✨ Let Us Guess Your Mood</a>
    </div>
  </main>

  <script src="/frontend/js/main.js"></script>
</body>
</html>
