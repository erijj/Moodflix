<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodflix — Movie Details</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }

    /* Cinematic backdrop */
    .movie-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: blur(60px) brightness(0.15);
      transform: scale(1.1);
      transition: background-image 0.5s;
    }

    .movie-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 8rem 2.5rem 5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Back button */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.88rem;
      margin-bottom: 2rem;
      transition: var(--transition);
      cursor: none;
    }
    .back-btn:hover { color: #fff; transform: translateX(-4px); }

    .movie-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
      align-items: start;
    }

    /* Poster */
    .poster-wrap {
      position: sticky;
      top: 6rem;
    }
    .poster-wrap img {
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      display: block;
      animation: fadeUp 0.8s ease 0.3s both;
    }
    .poster-3d {
      transition: transform 0.1s ease;
      transform-style: preserve-3d;
    }

    /* Info */
    .movie-info { animation: fadeUp 0.8s ease 0.5s both; }
    .movie-mood-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.9rem;
      border-radius: 50px;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 1rem;
      background: rgba(245,143,154,0.15);
      border: 1px solid rgba(245,143,154,0.3);
      color: var(--pink);
    }
    .movie-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .movie-meta {
      display: flex;
      gap: 1rem;
      align-items: center;
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .movie-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .movie-overview {
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.75);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    /* Action buttons */
    .action-btns {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    /* Star rating */
    .rating-section { margin-bottom: 2.5rem; }
    .rating-label {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 0.8rem;
    }
    .rating-display {
      font-size: 0.9rem;
      color: var(--snapdragon);
      margin-top: 0.5rem;
      font-weight: 500;
    }

    /* Comments */
    .comments-section { margin-top: 2rem; }
    .comments-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .comment-form { margin-bottom: 2rem; }
    .comment-item {
      padding: 1.2rem;
      border-radius: 16px;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s ease;
    }
    .comment-author {
      font-size: 0.82rem;
      color: var(--pink);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .comment-date {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.6rem;
    }
    .comment-text {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }
    .no-comments {
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .movie-layout { grid-template-columns: 1fr; }
      .poster-wrap { position: static; max-width: 220px; margin: 0 auto; }
      .action-btns { flex-direction: column; }
      .action-btns .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="movie-backdrop" id="backdrop"></div>
  <canvas id="particles-canvas"></canvas>
  <div class="page-overlay"></div>

  <nav>
    <a href="index.html" class="logo" data-transition>Moodflix</a>
    <button class="hamburger"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="all-movies.html" data-transition>All Movies</a></li><li><a href="moods.html" data-transition>Moods</a></li>
      <li><a href="mood-happy.html" data-transition>Browse</a></li>
      <li><a href="profile.html" data-transition>Profile</a></li>
    </ul>
  </nav>

  <main class="movie-page" id="movie-page">
    <a href="#" class="back-btn" id="back-link">← Back to mood</a>
    <div class="movie-layout">
      <div class="poster-wrap">
        <img src="" alt="" id="movie-poster" class="poster-3d" />
      </div>
      <div class="movie-info">
        <div class="movie-mood-badge" id="mood-badge">🎬 Mood Film</div>
        <h1 class="movie-title" id="movie-title">Loading...</h1>
        <div class="movie-meta">
          <span>📅 <span id="movie-year">—</span></span>
        </div>
        <p class="movie-overview" id="movie-overview">—</p>

        <!-- Actions -->
        <div class="action-btns">
          <button class="btn btn-primary" id="btn-like" onclick="toggleLike()">♡ Add to Liked</button>
          <button class="btn btn-glass" id="btn-watchlist" onclick="toggleWatchlist()">+ Add to Watchlist</button>
          <button class="btn btn-outline" onclick="showToast('🎬 Opens your streaming service!')">▶ Watch Now</button>
        </div>

        <!-- Rating -->
        <div class="rating-section">
          <p class="rating-label">Your Rating</p>
          <div class="stars" id="star-rating">
            <span class="star" data-val="1">★</span>
            <span class="star" data-val="2">★</span>
            <span class="star" data-val="3">★</span>
            <span class="star" data-val="4">★</span>
            <span class="star" data-val="5">★</span>
          </div>
          <p class="rating-display" id="rating-display">Not rated yet</p>
        </div>

        <!-- Comments -->
        <div class="comments-section">
          <h3>Comments</h3>
          <div class="comment-form glass-card" style="padding:1.5rem">
            <div class="form-group">
              <label class="form-label">Your name</label>
              <input type="text" class="form-input" id="comment-author" placeholder="Anonymous Cinephile" />
            </div>
            <div class="form-group">
              <label class="form-label">Your thoughts</label>
              <textarea class="form-textarea" id="comment-text" placeholder="What did you think of this film..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitComment()">Post Comment</button>
          </div>
          <div id="comments-list"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="main.js"></script>
  <script>
    // Get movie from URL params
    const params = new URLSearchParams(window.location.search);
    const movieId = params.get('id');
    const movieMood = params.get('mood');

    // Find film
    let film = null;
    for (const [mood, films] of Object.entries(MOVIES)) {
      const found = films.find(f => f.id === movieId);
      if (found) { film = found; break; }
    }

    // Mood page map
    const moodPages = {
      happy: 'mood-happy.html', sad: 'mood-sad.html', romantic: 'mood-romantic.html',
      excited: 'mood-excited.html', overwhelmed: 'mood-overwhelmed.html', bored: 'mood-bored.html'
    };
    const moodEmojis = { happy:'😊', sad:'😢', romantic:'💕', excited:'⚡', overwhelmed:'😮‍💨', bored:'😑' };
    const moodLabels = { happy:'Happy', sad:'Sad', romantic:'Romantic', excited:'Excited', overwhelmed:'Overwhelmed', bored:'Bored' };

    if (film) {
      // Backdrop
      document.getElementById('backdrop').style.backgroundImage = `url(${film.poster})`;
      // Content
      document.getElementById('movie-poster').src = film.poster;
      document.getElementById('movie-poster').alt = film.title;
      document.getElementById('movie-title').textContent = film.title;
      document.getElementById('movie-year').textContent = film.year;
      document.getElementById('movie-overview').textContent = film.overview;
      document.title = `Moodflix — ${film.title}`;
      const badge = document.getElementById('mood-badge');
      badge.textContent = `${moodEmojis[film.mood] || '🎬'} ${moodLabels[film.mood] || 'Film'}`;

      // Back link
      const backLink = document.getElementById('back-link');
      backLink.href = moodPages[film.mood] || 'mood-happy.html';
      backLink.setAttribute('data-transition', '');
      backLink.textContent = `← Back to ${moodLabels[film.mood] || ''} Films`;

      // 3D tilt effect
      const poster = document.getElementById('movie-poster');
      poster.parentElement.addEventListener('mousemove', e => {
        const rect = poster.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        poster.style.transform = `perspective(600px) rotateY(${x * 12}deg) rotateX(${-y * 12}deg)`;
      });
      poster.parentElement.addEventListener('mouseleave', () => {
        poster.style.transform = 'perspective(600px) rotateY(0) rotateX(0)';
      });
    } else {
      document.getElementById('movie-title').textContent = 'Movie not found';
    }

    // Like / Watchlist
    function updateBtns() {
      if (!film) return;
      const liked = Storage.getLiked().find(m => m.id === film.id);
      const wl = Storage.getWatchlist().find(m => m.id === film.id);
      document.getElementById('btn-like').innerHTML = liked ? '♥ Liked!' : '♡ Add to Liked';
      document.getElementById('btn-like').style.background = liked ? 'linear-gradient(135deg,var(--pink),var(--snapdragon))' : '';
      document.getElementById('btn-watchlist').textContent = wl ? '✓ In Watchlist' : '+ Add to Watchlist';
    }
    function toggleLike() {
      if (!film) return;
      const list = Storage.getLiked();
      const idx = list.findIndex(m => m.id === film.id);
      if (idx >= 0) { list.splice(idx, 1); Storage.setLiked(list); showToast('Removed from Liked'); }
      else { Storage.addLiked(film); showToast('❤️ Added to Liked!'); }
      updateBtns();
    }
    function toggleWatchlist() {
      if (!film) return;
      const list = Storage.getWatchlist();
      const idx = list.findIndex(m => m.id === film.id);
      if (idx >= 0) { list.splice(idx, 1); Storage.setWatchlist(list); showToast('Removed from Watchlist'); }
      else { Storage.addWatchlist(film); showToast('📌 Added to Watchlist!'); }
      updateBtns();
    }
    updateBtns();

    // Stars
    const stars = document.querySelectorAll('.star');
    let currentRating = film ? Storage.getRating(film.id) : 0;
    function renderStars(n) {
      stars.forEach((s, i) => s.classList.toggle('active', i < n));
      document.getElementById('rating-display').textContent = n > 0 ? `${n}/5 stars` : 'Not rated yet';
    }
    renderStars(currentRating);
    stars.forEach(star => {
      star.addEventListener('click', () => {
        if (!film) return;
        currentRating = parseInt(star.dataset.val);
        Storage.setRating(film.id, currentRating);
        renderStars(currentRating);
        showToast(`Rated ${currentRating} star${currentRating !== 1 ? 's' : ''}!`);
      });
      star.addEventListener('mouseenter', () => renderStars(parseInt(star.dataset.val)));
      star.addEventListener('mouseleave', () => renderStars(currentRating));
    });

    // Comments
    function renderComments() {
      if (!film) return;
      const comments = Storage.getComments(film.id);
      const list = document.getElementById('comments-list');
      if (comments.length === 0) {
        list.innerHTML = '<p class="no-comments">No comments yet. Be the first!</p>';
        return;
      }
      list.innerHTML = comments.map(c => `
        <div class="glass-card comment-item">
          <p class="comment-author">${c.author}</p>
          <p class="comment-date">${c.date}</p>
          <p class="comment-text">${c.text}</p>
        </div>
      `).join('');
    }
    function submitComment() {
      if (!film) return;
      const author = document.getElementById('comment-author').value.trim() || 'Anonymous Cinephile';
      const text = document.getElementById('comment-text').value.trim();
      if (!text) { showToast('Please write a comment first'); return; }
      const comments = Storage.getComments(film.id);
      comments.unshift({ author, text, date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) });
      Storage.setComments(film.id, comments);
      document.getElementById('comment-author').value = '';
      document.getElementById('comment-text').value = '';
      renderComments();
      showToast('💬 Comment posted!');
    }
    renderComments();
  </script>
</body>
</html>
