<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodflix — Profile</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .profile-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 8rem 2.5rem 5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ✅ NEW : Auth modal (login/register popup) */
    .auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-modal {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
    }

    /* ✅ NEW : User bar (affiche utilisateur connecté) */
    .user-bar {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<!-- ✅ NEW : AUTH MODAL (login/register) -->
<div class="auth-overlay" id="auth-overlay" style="display:none">
  <div class="auth-modal">

    <h2>Login</h2>

    <input id="l-email" type="email" placeholder="Email"><br><br>
    <input id="l-password" type="password" placeholder="Password"><br><br>

    <button onclick="doLogin()">Login</button>

    <hr>

    <h2>Register</h2>

    <input id="r-username" type="text" placeholder="Username"><br><br>
    <input id="r-email" type="email" placeholder="Email"><br><br>
    <input id="r-password" type="password" placeholder="Password"><br><br>

    <button onclick="doRegister()">Register</button>

  </div>
</div>

<main class="profile-page">

  <!-- ✅ NEW : USER BAR -->
  <div class="user-bar" id="user-bar" style="display:none">
    <span id="user-bar-name">User</span>
    <button onclick="doLogout()">Logout</button>
  </div>

  <!-- Profile -->
  <div class="profile-header">
    <div class="avatar">🎬</div>
    <input type="text" id="username-input" value="Cinephile">
  </div>

  <button onclick="randomSuggest()">🎲 Suggest Movie</button>
  <div id="suggestion-result"></div>

</main>

<!-- ✅ NEW : API connexion -->
<script src="api-client.js"></script>

<script>

let currentUser = null; // ✅ NEW : stock utilisateur connecté

/* ================= LOGIN ================= */
async function doLogin() { // ✅ NEW
  try {
    const res = await API.Auth.login(
      document.getElementById('l-email').value,
      document.getElementById('l-password').value
    );

    onLoggedIn(res.user);
    document.getElementById('auth-overlay').style.display = 'none';

  } catch (err) {
    alert(err.message);
  }
}

/* ================= REGISTER ================= */
async function doRegister() { // ✅ NEW
  try {
    const res = await API.Auth.register(
      document.getElementById('r-username').value,
      document.getElementById('r-email').value,
      document.getElementById('r-password').value
    );

    onLoggedIn(res.user);

  } catch (err) {
    alert(err.message);
  }
}

/* ================= LOGOUT ================= */
async function doLogout() { // ✅ NEW
  currentUser = null;
  document.getElementById('user-bar').style.display = 'none';
}

/* ================= AFTER LOGIN ================= */
function onLoggedIn(user) { // ✅ NEW
  currentUser = user;

  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('user-bar-name').textContent = user.username;
}

/* ================= SUGGEST ================= */
function randomSuggest() {

  if (currentUser) { // ✅ NEW : backend mode
    alert("Suggestion via backend");
  } else { // local mode
    alert("Suggestion via localStorage");
  }
}

/* ================= INIT ================= */
(async () => { // ✅ NEW : vérifier session
  try {
    const res = await API.Auth.me();

    if (res.user) {
      onLoggedIn(res.user);
    } else {
      document.getElementById('auth-overlay').style.display = 'flex';
    }

  } catch {
    console.log("Mode local (no backend)");
  }
})();

</script>

</body>
</html>
